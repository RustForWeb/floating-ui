name: CI

on:
    pull_request: {}
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    rust:
        name: Rust
        uses: RustForWeb/.github/.github/workflows/rust.yml@373c25f8fd29e10c40f1343f13312f8be3514af0
        with:
            enable-test: false
            target: wasm32-unknown-unknown

    test:
        name: Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
              with:
                  target: wasm32-unknown-unknown
                  components: rust-src

            - name: Install Cargo Binary Install
              uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

            - name: Install crates
              run: cargo binstall -y --force trunk

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'

            - name: Set up pnpm
              uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
              with:
                  version: 'latest'

            - name: Test
              run: cargo test --all-features --locked --release

            - name: Upload visual snapshot diffs
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: visual-snapshots-diff
                  path: target/tmp/floating-ui/packages/dom/test-results
